<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Diagnostic Supabase — CRM Quiz Room</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; padding: 40px; }
    h1 { font-size: 22px; margin-bottom: 20px; }
    .card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .test { padding: 12px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; }
    .pass { background: #f0fdf4; color: #16a34a; }
    .fail { background: #fef2f2; color: #dc2626; }
    .warn { background: #fffbeb; color: #d97706; }
    button { padding: 12px 24px; border: none; border-radius: 8px; background: #5b4cf0; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 12px; }
    button:hover { background: #4a3dd4; }
    #results { margin-top: 16px; }
    pre { background: #1a1917; color: #e8e6e1; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 12px; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>🔍 Diagnostic Supabase — CRM Quiz Room Amiens (v2)</h1>
  <div class="card">
    <p>Ce diagnostic teste la connexion entre votre CRM et le nouveau projet Supabase.</p>
    <button onclick="runDiag()">Lancer le diagnostic</button>
    <div id="results"></div>
  </div>
  <div class="card"><h3>Logs bruts</h3><pre id="logs">En attente...</pre></div>
  <script>
    const SUPABASE_URL = 'https://akahfbtcxnfdhkzsccut.supabase.co';
    const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFrYWhmYnRjeG5mZGhrenNjY3V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Mjc1NDcsImV4cCI6MjA4OTAwMzU0N30.gVCJOkuBhF68MKK2DbfqkJUnN22fR0JzxDqgZHTQYr4';
    const TABLES = ['settings', 'companies', 'deals', 'contacts', 'activities', 'quotes', 'catalogue', 'templates'];
    const headers = { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}`, 'Accept': 'application/json' };
    let logs = '';
    function log(msg) { logs += msg + '\n'; document.getElementById('logs').textContent = logs; }
    function addResult(text, type) {
      const div = document.createElement('div'); div.className = `test ${type}`; div.textContent = text;
      document.getElementById('results').appendChild(div);
    }
    async function runDiag() {
      document.getElementById('results').innerHTML = ''; logs = '';
      try {
        const resp = await fetch(`${SUPABASE_URL}/rest/v1/`, { headers });
        log(`Connexion: ${resp.status}`);
        addResult(resp.ok ? '✅ Connexion Supabase OK' : `❌ Connexion échouée (${resp.status})`, resp.ok ? 'pass' : 'fail');
        if (!resp.ok) return;
      } catch (e) { addResult(`❌ Impossible de contacter Supabase: ${e.message}`, 'fail'); return; }

      let ok = 0;
      for (const table of TABLES) {
        const resp = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*&limit=1`, { headers });
        const body = await resp.text();
        log(`${table}: ${resp.status} ${body.substring(0, 120)}`);
        if (resp.ok) { addResult(`✅ Table "${table}" OK`, 'pass'); ok++; }
        else { addResult(`❌ Table "${table}" — ${resp.status}: ${body.substring(0, 100)}`, 'fail'); }
      }
      addResult(ok === TABLES.length ? '🎉 Tout est OK ! Le CRM va fonctionner.' : `⚠️ ${TABLES.length - ok} tables manquantes. Exécutez le SQL setup.`, ok === TABLES.length ? 'pass' : 'warn');
    }
  </script>
</body>
</html>
